name: Build NanoPi K1 Plus

on:
  push:
    branches:
      - feat/nanopi-k1-plus
  workflow_dispatch:
    inputs:
      source_ref:
        description: ImmortalWrt commit SHA or branch to build
        required: false
        default: 4cafb73e88b6cf61cfeca2ee6cf8ecabb60f7a07
        type: string
      debug:
        description: Enable verbose build output
        required: false
        default: false
        type: boolean
      keep_build_info:
        description: Keep source and build directory inventory
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      SOURCE_REF: ${{ github.event.inputs.source_ref || '4cafb73e88b6cf61cfeca2ee6cf8ecabb60f7a07' }}
      DEBUG_BUILD: ${{ github.event.inputs.debug || 'false' }}
      KEEP_BUILD_INFO: ${{ github.event.inputs.keep_build_info || 'false' }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v7.0.0

      - name: Check disk space
        run: df -h

      - name: Release runner space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget xsltproc device-tree-compiler \
            python3-pyelftools ccache

      - name: Cache downloads and ccache
        uses: actions/cache@v6.1.0
        with:
          path: |
            .work/openwrt/dl
            .cache/ccache
          key: immortalwrt-${{ env.SOURCE_REF }}-${{ runner.os }}-${{ runner.arch }}

      - name: Clone fixed source
        run: |
          mkdir -p .work .cache/ccache
          ./scripts/prepare-source.sh "$GITHUB_WORKSPACE/.work/openwrt" "$SOURCE_REF" | tee .work/source.log

      - name: Update feeds and apply K1 Plus patches
        run: |
          cd .work/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cd "$GITHUB_WORKSPACE"
          ./scripts/apply-patches.sh .work/openwrt "$GITHUB_WORKSPACE" | tee .work/patch.log
          cp configs/NanoPi_K1_Plus.config .work/openwrt/.config
          cd .work/openwrt
          make defconfig

      - name: Download sources
        run: |
          cd .work/openwrt
          make download -j"$(nproc)" V=s

      - name: Build firmware
        run: |
          set +e
          cd .work/openwrt
          export CCACHE_DIR="$GITHUB_WORKSPACE/.cache/ccache"
          if [ "$DEBUG_BUILD" = true ]; then
            verbosity=V=1
          else
            verbosity=V=s
          fi
          make -j"$(nproc)" "$verbosity" 2>&1 | tee "$GITHUB_WORKSPACE/.work/build-parallel.log"
          result=${PIPESTATUS[0]}
          if [ "$result" -ne 0 ]; then
            echo 'Parallel build failed; retrying with one job and verbose output.' >&2
            make -j1 V=1 2>&1 | tee "$GITHUB_WORKSPACE/.work/build-single.log"
            result=${PIPESTATUS[0]}
          fi
          exit "$result"

      - name: Keep build inventory
        if: ${{ env.KEEP_BUILD_INFO == 'true' }}
        run: |
          mkdir -p .work/build-info
          du -sh .work/openwrt/* .work/openwrt/build_dir/* .work/openwrt/staging_dir/* 2>/dev/null > .work/build-info/size.txt || true
          find .work/openwrt/build_dir -maxdepth 4 -type f -name '*.log' -print > .work/build-info/log-files.txt || true

      - name: Collect and verify image
        if: success()
        run: |
          ./scripts/collect-artifacts.sh \
            .work/openwrt/bin/targets/sunxi/cortexa53 \
            .work/artifact \
            .work/openwrt
          ./scripts/verify-image.sh .work/artifact
          if [ -f .work/build-single.log ]; then
            cat .work/build-parallel.log .work/build-single.log > .work/artifact/build.log
          else
            cp .work/build-parallel.log .work/artifact/build.log
          fi
          cp .work/source.log .work/artifact/source.log
          cp .work/patch.log .work/artifact/patch.log
          [ "$KEEP_BUILD_INFO" = true ] && cp -r .work/build-info .work/artifact/ || true

      - name: Prepare failure diagnostics
        if: failure()
        run: |
          mkdir -p .work/failure
          for log in .work/build-parallel.log .work/build-single.log .work/source.log .work/patch.log; do
            [ -f "$log" ] && tail -n 5000 "$log" >> .work/failure/last-5000-lines.log
          done
          [ -f .work/openwrt/.config ] && cp .work/openwrt/.config .work/failure/config.full
          [ -f .work/patch.log ] && cp .work/patch.log .work/failure/patch.log
          df -h > .work/failure/disk-space.txt

      - name: Upload successful firmware
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NanoPi-K1-Plus-OpenWrt
          path: .work/artifact
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: NanoPi-K1-Plus-failure
          path: .work/failure
          if-no-files-found: warn
